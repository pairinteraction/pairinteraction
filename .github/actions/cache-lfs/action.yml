name: cache-lfs

runs:
  using: composite
  steps:
    - name: Create LFS file list
      shell: bash
      run: |
        set -euxo pipefail
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git lfs ls-files -l | awk '{print $1}' | sort -u > .lfs-assets-id

    - name: Restore Git LFS cache
      uses: actions/cache@v5
      with:
        path: .git/lfs
        key: ${{ runner.os }}-git-lfs-${{ hashFiles('.lfs-assets-id') }}
        restore-keys: |
          ${{ runner.os }}-git-lfs-

    - name: Pull missing Git LFS objects
      shell: bash
      run: |
        set -euxo pipefail
        git lfs fetch --prune
        git lfs checkout
